services:
  db:
    image: postgres:16
    container_name: xpertpro-postgres
    environment:
      POSTGRES_DB: xpert_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - xpertpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xpert_pro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xpertpro_pgdata:
